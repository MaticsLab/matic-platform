<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Portal Sign In</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #0051cc;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Portal Auth Test</h1>
    
    <div class="info">
        <strong>Test Portal Sign In</strong><br>
        This tests the <code>/api/portal-auth</code> endpoint directly.
    </div>

    <form id="signinForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required 
                   placeholder="test@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required 
                   placeholder="Enter password">
        </div>
        
        <button type="submit">Sign In</button>
    </form>

    <div id="result" class="result"></div>

    <script>
        const form = document.getElementById('signinForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
            
            try {
                console.log('Attempting sign in with:', email);
                
                const response = await fetch('http://localhost:3000/api/portal-auth/sign-in/email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();
                console.log('Response:', data);

                if (response.ok && data.user) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong>✓ Sign in successful!</strong><br>
                        User: ${data.user.email}<br>
                        ID: ${data.user.id}
                    `;
                    
                    // Test session
                    setTimeout(async () => {
                        const sessionResp = await fetch('http://localhost:3000/api/portal-auth/get-session', {
                            credentials: 'include'
                        });
                        const sessionData = await sessionResp.json();
                        console.log('Session check:', sessionData);
                        
                        if (sessionData.user) {
                            resultDiv.innerHTML += `<br><br><strong>Session verified!</strong>`;
                        }
                    }, 500);
                    
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <strong>✗ Sign in failed</strong><br>
                        ${data.error?.message || 'Unknown error'}<br>
                        <small>${JSON.stringify(data.error || data, null, 2)}</small>
                    `;
                }
                
                resultDiv.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <strong>✗ Request failed</strong><br>
                    ${error.message}
                `;
                resultDiv.style.display = 'block';
            }
        });

        // Test endpoint on load
        fetch('http://localhost:3000/api/portal-auth/get-session', {
            credentials: 'include'
        })
        .then(r => r.json())
        .then(data => {
            console.log('Initial session check:', data);
            if (data.user) {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <strong>Already signed in!</strong><br>
                    User: ${data.user.email}
                `;
                resultDiv.style.display = 'block';
            }
        })
        .catch(console.error);
    </script>
</body>
</html>
