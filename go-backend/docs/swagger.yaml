host: localhost:8080
info:
  contact:
    name: Matic Platform Engineering
  description: |-
    Go/Gin backend for the Matic Platform. This spec is generated incrementally via swaggo/swag —
    only the Tables (data_tables.go) and Forms (forms.go) handler domains are annotated so far.
    See docs/API_CLIENT_CODEGEN.md for how to extend this to other handler domains.
  title: Matic Platform API
  version: "1.0"
paths:
  /forms:
    get:
      description: Lists all forms (tables with icon "form") in a workspace for an
        authenticated member.
      parameters:
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.FormDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List forms in a workspace
      tags:
      - forms
    post:
      consumes:
      - application/json
      description: Creates a new form (a data table with icon "form") plus its associated
        form view.
      parameters:
      - description: Form to create
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateFormInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.FormDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a form
      tags:
      - forms
  /forms/{id}:
    delete:
      description: Deletes a form and, within a transaction, all of its rows (submissions)
        and fields.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a form
      tags:
      - forms
    get:
      description: Returns a single form (backed by a data table with icon "form")
        with its fields and publish state.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FormDTO'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a form by ID
      tags:
      - forms
    patch:
      consumes:
      - application/json
      description: Partially updates a form's name, description, settings, publish
        state, or preview metadata.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateFormInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FormDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a form
      tags:
      - forms
  /forms/{id}/custom-slug:
    put:
      consumes:
      - application/json
      description: Sets or clears the custom URL slug used for pretty public portal
        links.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: New custom slug (null to remove)
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateFormCustomSlugInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FormDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a form's custom slug
      tags:
      - forms
  /forms/{id}/structure:
    put:
      consumes:
      - application/json
      description: |-
        Replaces a form's builder structure — settings, sections (with their fields), and translations —
        rebuilding the underlying table fields to match.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: New form structure
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateFormStructureInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Replace a form's structure
      tags:
      - forms
  /forms/{id}/submission:
    get:
      description: |-
        Looks up a submission for a form by matching an applicant's email against several known
        field locations in the row/submission data. Used to resume an in-progress application.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: Applicant email
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a form submission by applicant email
      tags:
      - forms
  /forms/{id}/submissions:
    get:
      description: |-
        Lists submissions for a form. Tries the new form_submissions schema first (raw_data),
        falling back to the legacy table_rows-backed submissions.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: Include submitter user info
        in: query
        name: include_user
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List submissions for a form
      tags:
      - forms
  /forms/{id}/submissions/{submission_id}:
    delete:
      description: Permanently deletes a single form submission (row) by its ID.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: Submission ID
        in: path
        name: submission_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a form submission
      tags:
      - forms
  /forms/{id}/submit:
    post:
      consumes:
      - application/json
      description: Creates a new submission (row) for a published form and queues
        it for semantic embedding.
      parameters:
      - description: Form ID
        in: path
        name: id
        required: true
        type: string
      - description: Submission data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.SubmitFormInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Row'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Submit a form
      tags:
      - forms
  /forms/by-slug/{slug}:
    get:
      description: Resolves a form by its auto-generated slug, custom_slug, or (if
        a UUID is passed) its ID.
      parameters:
      - description: Form slug, custom slug, or ID
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FormDTO'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a form by slug
      tags:
      - forms
  /forms/by-subdomain/{subdomain}/{slug}:
    get:
      description: |-
        Resolves a form for pretty public portal URLs of the form {subdomain}.maticapp.com/{slug}.
